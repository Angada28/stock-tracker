[tracker]
; Earliest date to fetch/backfill history from (YYYY-MM-DD).
; Change this to your preferred start date.
backfill_start = 2026-06-25

; Day of week to auto-fill gaps (0=Monday, 1=Tuesday ... 6=Sunday).
; Every week on this day the daily run will silently backfill any missing
; entries for all tracked symbols from backfill_start to today.
weekly_fill_day = 0
