name: Stock Tracker

on:
  schedule:
    # 4:30 PM ET = 20:30 UTC (EST) / 21:30 UTC (EDT)
    # Runs Monday-Friday at 20:30 UTC (covers EST; adjust to 21:30 in summer if needed)
    - cron: '30 20 * * 1-5'
  workflow_dispatch:  # allow manual runs from GitHub Actions tab

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock tracker
        run: python main.py

      - name: Prune Excel files older than 30 days
        run: |
          find excel/ -name "stocks_*.xlsx" -mtime +30 -delete || true

      - name: Commit and push updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stocks.db dashboard.html excel/
          git diff --cached --quiet || git commit -m "chore: update data $(date -u '+%Y-%m-%d')"
          git push
